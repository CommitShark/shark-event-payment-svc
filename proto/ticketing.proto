syntax = "proto3";

package ticketing;

import "google/protobuf/timestamp.proto";

service GrpcTicketingService {
  rpc CheckReservation(CheckReservationRequest) returns (CheckReservationResponse);

  rpc GetTicketPrice(GetTicketPriceRequest) returns (GetTicketPriceResponse);

  rpc MarkReservationAsPaid(MarkReservationAsPaidRequest) returns (MarkReservationAsPaidResponse);

  rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);

  rpc GetReservationExtraOrders(GetReservationExtraOrdersRequest) returns (GetReservationExtraOrdersResponse);

  rpc CreateGateTicket(CreateGateTicketRequest) returns (CreateGateTicketResponse);

  rpc ListOccurrenceTicketUsers(ListOccurrenceTicketUsersRequest) returns (ListOccurrenceTicketUsersResponse);
}

message ListOccurrenceTicketUsersRequest {
    string occurrence_id = 1;
}

message ListOccurrenceTicketUsersResponse {
    repeated string user_ids = 2;
}

message CreateGateTicketRequest {
    string ticket_type_id = 1;
    string user_id = 2;
    string occurrence_id = 3;
    string amount = 4;
}

message CreateGateTicketResponse {
    string qr = 1;
    optional string error = 2;
}

message CancelReservationRequest {
    string reservation_id = 1;
}

message CancelReservationResponse {
    optional string error = 1;
}

message MarkReservationAsPaidRequest {
    string reservation_id = 1;
    string ticket_amount = 2;
}

message ExtraOrderDto {
    string extra_id = 1;
    int32 extra_version = 2;
    int32 quantity = 3;
    string unit_price = 4;
    string recipient = 5;
}

message GetReservationExtraOrdersRequest {
    string reservation_id = 1;
}

message GetReservationExtraOrdersResponse {
    optional string error = 1;
    repeated ExtraOrderDto orders = 2;
}

message MarkReservationAsPaidResponse {
    optional string error = 1;
}

message GetTicketPriceRequest {
    string ticket_type_id = 1;
}

message GetTicketPriceResponse {
    optional string error = 1;
    string amount = 2;
}

message CheckReservationRequest {
    string reservation_id = 1;
}

message Reservation {
    string id = 1;
    string user_id = 2;
    google.protobuf.Timestamp created_at = 3;
    google.protobuf.Timestamp expires_at = 4;
    string status = 5;
}

message CheckReservationResponse {
    bool exists = 1;
    bool valid = 2;
    Reservation reservation = 3;
    string error = 4;
}